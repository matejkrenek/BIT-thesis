name: bit-thesis

# Follows the official pytorch3d install guide (INSTALL.md), python changed to 3.10.
# pytorch-cuda=11.6 from the guide only works with pytorch 1.x;
# 11.8 is the minimum for pytorch 2.x and is backward-compatible with
# CUDA drivers 11.8+ (remote: 12.2, local: 13.0).
# pytorch3d is installed as a pre-built conda binary — no compilation needed.

channels:
  - pytorch3d   # pre-built pytorch3d binaries
  - pytorch
  - nvidia
  - iopath
  - fvcore
  - conda-forge
  - defaults

dependencies:
  # --- base (mirrors the guide, python bumped to 3.10) ---
  - python=3.10
  - pip
  - pytorch=2.4.1
  - torchvision
  - pytorch-cuda=11.8   # closest to guide's 11.6 that works with pytorch 2.x
  - iopath
  - fvcore
  - pytorch3d           # pre-built binary from pytorch3d channel

  # --- pip packages (from original environment) ---
  - pip:
    # core scientific
    - numpy==1.26.4
    - scipy==1.15.3
    - scikit-learn==1.6.1
    - pandas==2.3.3
    - matplotlib==3.9.4
